<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORE!STROKE Practice App</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b3d2e;color:#fff;margin:0;padding:20px}
body.flash-green{animation:flashGreen .15s ease-in-out}
body.flash-red{animation:flashRed .15s ease-in-out}

@keyframes flashGreen{from{background:#0b3d2e}to{background:#145a43}}
@keyframes flashRed{from{background:#0b3d2e}to{background:#6b2a2a}}

.card{background:#145a43;border-radius:14px;padding:20px;max-width:960px;margin:0 auto;box-shadow:0 10px 25px rgba(0,0,0,.3)}
h1,h2,h3{text-align:center;margin:0 0 10px}
h1{font-size:34px;letter-spacing:.04em}

.pill-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px}
.pill-btn{background:#1c7c5b;border:none;padding:10px 20px;border-radius:999px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap;font-size:20px}
.pill-btn.active{background:#2ecc71;color:#000}
.pill-btn:disabled{cursor:default;opacity:1}

.range-speed{display:flex;align-items:center;gap:2px;background:#1c7c5b;padding:6px;border-radius:999px}
.range-speed-value{min-width:74px;text-align:center;font-size:18px;font-weight:800}
.range-temp-value{min-width:68px}
.range-temp-stepper{gap:0;padding:6px 4px}
.range-speed-btn{border:none;border-radius:999px;background:#2ecc71;color:#000;font-size:22px;font-weight:800;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 #1e9e54}

.mode-card{margin-bottom:14px;padding:12px;border-radius:12px;background:#0e4f3a}
.mode-row{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;width:100%}
.mode-row.equal-buttons{flex-wrap:nowrap}
.mode-row.equal-buttons .mode-btn{flex:1;min-width:0}
.mode-row.settings-row{margin-top:10px}
.mode-btn{width:100%;display:block;border:none;border-radius:12px;padding:10px 20px;font-size:20px;font-weight:800;cursor:pointer;background:#8a8a8a;color:#000;white-space:normal;line-height:1.15;text-align:center;box-shadow:0 4px 0 #666}
.mode-btn.active{background:#2ecc71;box-shadow:0 4px 0 #1e9e54}
.mode-btn.target-set-btn{background:#2ecc71;box-shadow:0 4px 0 #1e9e54}
.mode-btn.target-set-btn.range-active{background:#1d5b86;color:#fff;box-shadow:0 5px 0 #154462}
.mode-btn:disabled{cursor:default;opacity:1}
.mode-target{margin:10px 0 14px;padding:10px;border-radius:10px;background:#1c7c5b;font-size:24px;font-weight:800;text-align:center}
.setup-panel{display:none;margin-top:12px;padding:12px;border-radius:12px;background:#145a43;box-sizing:border-box}
.setup-panel.active{display:block}
.setup-panel.club-setup-active,.setup-panel.distance-setup-active{width:calc(100vw - 40px);max-width:calc(100vw - 40px);position:relative;left:50%;transform:translateX(-50%)}
.setup-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.setup-toolbar.secondary{margin-top:8px;margin-bottom:0}
.setup-mini-btn{border:none;border-radius:999px;padding:8px 14px;font-size:15px;font-weight:800;cursor:pointer;background:#2ecc71;color:#000;box-shadow:0 4px 0 #1e9e54}
.setup-copy{font-size:14px;opacity:.85;margin-bottom:10px}
.setup-list-header{display:grid;grid-template-columns:repeat(var(--club-setup-columns,1),minmax(0,1fr));gap:6px;margin-top:6px;margin-bottom:4px}
.setup-list-title{font-weight:800}
.club-setup-header{gap:4px;margin-top:4px;margin-bottom:2px}
.club-setup-header .setup-list-title{text-align:center}
.setup-list{display:grid;gap:10px}
.setup-add-row{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,1fr) max-content;column-gap:6px;row-gap:10px;align-items:center;margin-top:6px;margin-bottom:6px}
.setup-add-field{display:flex;min-width:0}
.setup-add-input{width:100%;min-width:0;padding:8px 10px;border:none;border-radius:10px;background:#1c7c5b;color:#d9d9d9;font-size:15px;font-weight:400}
.setup-add-input:not(:placeholder-shown){font-weight:800}
.setup-add-input::placeholder{color:#d9d9d9;opacity:1}
.setup-add-btn{border:none;border-radius:10px;padding:8px 14px;font-size:15px;font-weight:800;cursor:pointer;background:#2ecc71;color:#000;box-shadow:0 4px 0 #1e9e54;justify-self:start}
.setup-delete-btn{width:28px;height:28px;border:none;border-radius:999px;padding:0;font-size:18px;font-weight:800;line-height:1;cursor:pointer;background:#E34234;color:#000;display:flex;align-items:center;justify-content:center}
.setup-range-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));column-gap:14px;row-gap:0;width:100%;max-width:100%;box-sizing:border-box;margin-top:6px;margin-bottom:6px}
.setup-range-field{display:grid;gap:6px;min-width:0;width:100%;max-width:100%;box-sizing:border-box;font-weight:800}
.setup-range-field span{text-align:left}
.setup-range-input{width:100%;max-width:100%;min-width:0;padding:8px 10px;box-sizing:border-box;border:none;border-radius:10px;background:#1c7c5b;color:#fff;font-size:16px;font-weight:800}
.club-setup-list{grid-template-columns:repeat(var(--club-setup-columns,2),minmax(0,1fr));gap:4px}
.club-setup-list .setup-item{display:grid;grid-template-columns:24px auto minmax(0,1fr) 24px;column-gap:4px;row-gap:0;align-items:center;width:100%;padding:6px;box-sizing:border-box}
.setup-item{display:grid;grid-template-columns:20px minmax(0,1fr) 86px 28px;column-gap:4px;row-gap:7px;align-items:center;padding:10px;border-radius:10px;background:#0e4f3a}
.setup-item span{font-weight:800;min-width:0;overflow-wrap:anywhere}
.setup-check{width:20px;height:20px;min-width:20px;min-height:20px;flex:0 0 20px}
.distance-item .setup-check{width:20px;height:20px;min-width:20px;min-height:20px;flex:0 0 20px}
.setup-input{width:86px;max-width:100%;padding:7px 8px;border:none;border-radius:10px;background:#1c7c5b;color:#fff;font-size:15px;font-weight:800;text-align:center;justify-self:start}
.club-setup-list .setup-check{margin-right:0;justify-self:center}
.club-setup-list .setup-item span{display:block;min-width:0;margin-right:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.club-setup-list .setup-input{width:100%;min-width:0;max-width:100%;padding:7px 4px;box-sizing:border-box;justify-self:stretch}
.club-setup-list .setup-delete-btn{width:24px;height:24px;margin-left:0;font-size:16px;justify-self:center}
.distance-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:8px;margin-top:6px}
.distance-item{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border-radius:10px;background:#0e4f3a;font-weight:800}
@media (max-width:560px){.setup-add-row{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}.setup-add-btn{grid-column:1/-1;justify-self:stretch}}

.interface-window{background:#0e4f3a;border-radius:14px;padding:0;overflow:hidden;margin:14px 0}
.tracker-grid{display:flex;flex-wrap:wrap;gap:0;align-items:flex-start;justify-content:stretch;width:100%}
.tracker-panel{background:#145a43;border-radius:0;padding:0;display:flex;justify-content:center;align-items:center;overflow:hidden;flex:1 1 320px}
.accuracy-shell{width:256.5px;height:256.5px;display:flex;align-items:center;justify-content:center;margin:0}
.contact-shell{width:256.5px;height:174.6px;display:flex;align-items:center;justify-content:center;margin:6px}

.accuracy-ring{width:256.5px;height:256.5px;border-radius:50%;position:relative;margin:0;transform:rotate(45deg);transform-origin:center}
.accuracy-ring::before,.accuracy-ring::after{content:"";position:absolute;background:#000;opacity:.9;pointer-events:none;z-index:4}
.accuracy-ring::before{width:2px;height:100%;left:50%;top:0;transform:translateX(-50%) rotate(45deg)}
.accuracy-ring::after{width:2px;height:100%;left:50%;top:0;transform:translateX(-50%) rotate(-45deg)}
.accuracy-wedge{position:absolute;inset:0;border:none;border-radius:50%;background:#E34234;cursor:pointer;z-index:1;-webkit-mask:radial-gradient(circle at center,transparent 0 49.5px,black 50.4px);mask:radial-gradient(circle at center,transparent 0 49.5px,black 50.4px)}
.accuracy-wedge:hover{filter:brightness(1.1)}
.accuracy-wedge:active{transform:scale(.97);filter:brightness(.95)}
.accuracy-wedge.selected{background:#f06e63;box-shadow:inset 0 0 0 5.4px rgba(255,255,255,.55),0 0 0 3.6px rgba(255,255,255,.16)}
.accuracy-topright{clip-path:polygon(50% 50%,0% 0%,100% 0%)}
.accuracy-bottomleft{clip-path:polygon(50% 50%,100% 100%,0% 100%)}
.accuracy-topleft{clip-path:polygon(50% 50%,0% 100%,0% 0%)}
.accuracy-bottomright{clip-path:polygon(50% 50%,100% 0%,100% 100%)}
.accuracy-label-top,.accuracy-label-bottom,.accuracy-label-left,.accuracy-label-right{position:absolute;font-weight:800;color:#000;font-size:21.6px;line-height:1.05;z-index:5;pointer-events:none}
.accuracy-label-top{top:9px;left:50%;transform:translateX(-50%)}
.accuracy-label-bottom{bottom:9px;left:50%;transform:translateX(-50%)}
.accuracy-label-left{left:9px;top:50%;transform:translateY(-50%) rotate(-90deg)}
.accuracy-label-right{right:9px;top:50%;transform:translateY(-50%) rotate(270deg)}
.accuracy-made{width:99px;height:99px;border:none;border-radius:50%;background:#2ecc71;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:21.6px;font-weight:800;color:#000;box-shadow:2.7px 0 0 #1e9e54,0 2.7px 0 #1e9e54,0 9px 18px rgba(0,0,0,.35);border-bottom:2.7px solid #1e9e54;border-right:2.7px solid #1e9e54;cursor:pointer;text-align:center;line-height:1.1;position:absolute;top:50%;left:50%;transform:translate(calc(-50% - 3.6px),-52%) rotate(-45deg);z-index:6}
.accuracy-made.selected{box-shadow:0 0 0 5.4px rgba(255,255,255,.4),2.7px 0 0 #1e9e54,0 2.7px 0 #1e9e54,0 9px 18px rgba(0,0,0,.35)}
.accuracy-made:active{transform:translate(calc(-50% - 3.6px),-52%) rotate(-45deg) translateY(2.7px) scale(.97);box-shadow:.9px 0 0 #1e9e54,0 .9px 0 #1e9e54,0 5.4px 10.8px rgba(0,0,0,.35)}

.contact-ring{width:285px;height:194px;position:relative;margin:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr .7fr;overflow:hidden;border-radius:54px 40px 34px 62px;clip-path:polygon(8% 0,100% 28%,100% 100%,4% 100%,0 96%,0 10%,2% 3%);background:linear-gradient(180deg,rgba(255,255,255,.62) 0%,rgba(255,255,255,.16) 20%,rgba(0,0,0,.08) 100%),repeating-linear-gradient(180deg,transparent 0 17px,rgba(102,112,122,.22) 17px 19px),linear-gradient(145deg,#f8fbfd 0%,#e0e7ee 24%,#c0cad4 58%,#f5f8fb 100%);border:6px solid #d2dbe3;box-shadow:inset 0 0 0 2px rgba(255,255,255,.6),inset 0 -12px 16px rgba(84,95,107,.24),0 14px 28px rgba(0,0,0,.28);transform:scale(.9);transform-origin:center}
.contact-ring::before,.contact-ring::after{content:"";position:absolute;pointer-events:none}
.contact-ring::before{left:22.8px;top:-3px;width:267.81px;height:6px;background:#d2dbe3;border-radius:999px;transform-origin:left center;transform:rotate(11.74deg);z-index:3}
.contact-ring::after{inset:0;background:linear-gradient(rgba(48,55,64,.78),rgba(48,55,64,.78)) 50% 0/2px 100% no-repeat,linear-gradient(rgba(48,55,64,.78),rgba(48,55,64,.78)) 0 58.824%/100% 2px no-repeat;z-index:4}
.contact-wedge{position:relative;background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,rgba(166,176,186,.08) 100%);cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:800;color:#1d242b;font-size:20px;line-height:1.05;letter-spacing:.06em;text-shadow:0 1px 0 rgba(255,255,255,.72);overflow:hidden;border:none}
.contact-wedge:hover{filter:brightness(1.1)}
.contact-wedge:active{transform:scale(.97) translateY(3px);filter:brightness(.95)}
.contact-wedge.selected{box-shadow:inset 0 0 0 6px rgba(46,204,113,.6)}
.contact-label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:100%;text-align:center}
.contact-label span{font-size:21.6px;letter-spacing:0;line-height:1.05;color:#000;text-shadow:none}
.contact-topleft .contact-label,.contact-topright .contact-label{transform:translateY(18px)}
.toe-label{transform:translateX(-16px)}
.heel-label{transform:translateX(22px)}
.contact-topleft{grid-column:1;grid-row:1;border-top-left-radius:42px 34px;clip-path:inset(0 round 42px 0 0 0);margin-left:-12px;padding-left:12px}
.contact-topright{grid-column:2;grid-row:1;border-top-right-radius:26px 20px;clip-path:inset(0 round 0 26px 0 0)}
.contact-bottomleft{grid-column:1;grid-row:2;border-bottom-left-radius:48px 38px;clip-path:inset(0 round 0 0 0 48px);margin-left:-12px;padding-left:12px}
.contact-bottomright{grid-column:2;grid-row:2;border-bottom-right-radius:28px 22px;clip-path:inset(0 round 0 0 28px 0)}
.contact-made-wrap{position:absolute;inset:0;z-index:5;pointer-events:none}
.contact-made{width:99px;height:99px;border:none;border-radius:50%;background:#2ecc71;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:#000;box-shadow:3px 0 0 #1e9e54,0 3px 0 #1e9e54,0 10px 20px rgba(0,0,0,.35);border-bottom:3px solid #1e9e54;border-right:3px solid #1e9e54;cursor:pointer;text-align:center;line-height:1.05;position:absolute;top:58.824%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:auto;padding:0 8px}
.contact-made.selected{box-shadow:0 0 0 6px rgba(255,255,255,.4),3px 0 0 #1e9e54,0 3px 0 #1e9e54,0 10px 20px rgba(0,0,0,.35)}
.contact-made:active{transform:translate(-50%,-50%) translateY(3px) scale(.97);box-shadow:1px 0 0 #1e9e54,0 1px 0 #1e9e54,0 6px 12px rgba(0,0,0,.35)}

button:active:not(.accuracy-made):not(.contact-made):not(.accuracy-wedge):not(.contact-wedge){transform:translateY(3px) scale(.98);box-shadow:0 2px 0 rgba(0,0,0,.35)!important}

.stats{text-align:center;font-size:18px;margin-top:16px}
.stats p{margin:6px 0}
.stats-panel{margin-top:10px;padding:12px 14px 14px;border-radius:14px;background:#0e4f3a}
.combined-stats{margin-top:0;padding-top:0}
.subtle{opacity:.75;font-size:14px}

.mishit-panel{margin-top:10px;padding:14px;border-radius:12px;background:#1c7c5b}

.mishit-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;width:100%;margin-top:0}
.mishit-btn{width:100%;min-height:58px;display:flex;align-items:center;justify-content:center;color:#000;border:none;border-radius:12px;padding:6px 10px;font-size:20px;font-weight:800;line-height:1.1;box-shadow:0 6px 0 rgba(0,0,0,.25),0 10px 18px rgba(0,0,0,.25);cursor:pointer}
.skull-btn{background:#f4a261;box-shadow:0 6px 0 #c57f3d,0 10px 18px rgba(0,0,0,.25)}
.duff-btn{background:#e9c46a;box-shadow:0 6px 0 #b89445,0 10px 18px rgba(0,0,0,.25)}
.shank-btn{background:#8b5a2b;color:#fff;box-shadow:0 8px 0 #5f3d1c,0 10px 18px rgba(0,0,0,.25)}

.badge{margin-top:10px;padding:10px;border-radius:10px;background:#0e4f3a;font-size:20px;font-weight:800}
.badge.manual-badge{font-size:20px;font-weight:800}
.badge.random-badge{background:#1d5b86;color:#fff}
.badge-content{text-align:center}
.random-total-line{font-weight:400}

.session-actions{display:flex;justify-content:space-between;gap:16px;margin-top:16px;width:100%;position:relative;z-index:20;pointer-events:auto}
.action-btn{flex:1;color:#000;padding:8px 10px;font-size:20px;font-weight:800;border:none;border-radius:12px;cursor:pointer;position:relative;z-index:21;pointer-events:auto;touch-action:manipulation}
.new-session-btn{background:#0096FF;box-shadow:0 6px 0 #0074c7,0 14px 22px rgba(0,0,0,.45)}
.undo-btn{background:#8a8a8a;box-shadow:0 6px 0 #666,0 14px 22px rgba(0,0,0,.45)}

.history-header{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.history-card{padding:10px;background:#1c7c5b;border-radius:10px;cursor:pointer}
.history-wrapper{margin-bottom:10px}
.accordion{display:none;margin-top:8px;padding:10px;background:#0e4f3a;border-radius:10px}
.history-block{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.12)}
.history-block:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}

@media (max-width:840px){
 .session-actions{flex-direction:column}
 .accuracy-label-left{transform:translateY(-50%) rotate(-90deg)}
 .accuracy-label-right{transform:translateY(-50%) rotate(270deg)}
}

@media (orientation:landscape){
 .tracker-grid{flex-wrap:nowrap;align-items:stretch}
 .tracker-panel{align-self:stretch}
}
</style>
</head>
<body>
<div class="card">
<h1>FORE!STROKE</h1>

<div class="mode-card">
<div class="mode-row equal-buttons">
<button id="clubSetupBtn" class="mode-btn" type="button" onclick="toggleSetupPanel('clubs')">Club<br>Setup</button>
<button id="distanceSetupBtn" class="mode-btn" type="button" onclick="toggleSetupPanel('distances')">Distance<br>Setup</button>
</div>
<div class="mode-row equal-buttons settings-row">
<button id="practiceModeBtn" class="mode-btn" onclick="togglePracticeMode()">Manual<br>Mode On</button>
<button id="targetSetBtn" class="mode-btn target-set-btn" onclick="toggleTargetSetMode()">Wedge<br>Mode On</button>
</div>
<div id="setupPanel" class="setup-panel"></div>
</div>

<div id="clubRow" class="pill-row"></div>
<div id="distanceRow" class="pill-row"></div>
<div id="modeTarget" class="mode-target">Current Shot:</div>

<div class="interface-window">
<div class="tracker-grid">
<div class="tracker-panel">
<div class="accuracy-shell">
<div class="accuracy-ring">
<button id="accuracy-longRight" class="accuracy-wedge accuracy-topright" type="button" onclick="recordMissed('longRight')"></button>
<button id="accuracy-shortLeft" class="accuracy-wedge accuracy-bottomleft" type="button" onclick="recordMissed('shortLeft')"></button>
<button id="accuracy-longLeft" class="accuracy-wedge accuracy-topleft" type="button" onclick="recordMissed('longLeft')"></button>
<button id="accuracy-shortRight" class="accuracy-wedge accuracy-bottomright" type="button" onclick="recordMissed('shortRight')"></button>
<span class="accuracy-label-top">Long<br>Right</span>
<span class="accuracy-label-bottom">Short<br>Left</span>
<span class="accuracy-label-left">Long<br>Left</span>
<span class="accuracy-label-right">Short<br>Right</span>
<button id="accuracy-made" class="accuracy-made" type="button" onclick="recordMade()">MADE</button>
</div>
</div>
</div>

<div class="tracker-panel">
<div class="contact-shell">
<div class="contact-ring">
<button id="contact-highToe" class="contact-wedge contact-topleft" type="button" onclick="recordContactMissed('highToe')"><span class="contact-label"><span class="toe-label">High</span><span class="toe-label">Toe</span></span></button>
<button id="contact-highHeel" class="contact-wedge contact-topright" type="button" onclick="recordContactMissed('highHeel')"><span class="contact-label"><span class="heel-label">High</span><span class="heel-label">Heel</span></span></button>
<button id="contact-lowToe" class="contact-wedge contact-bottomleft" type="button" onclick="recordContactMissed('lowToe')"><span class="contact-label"><span class="toe-label">Low</span><span class="toe-label">Toe</span></span></button>
<button id="contact-lowHeel" class="contact-wedge contact-bottomright" type="button" onclick="recordContactMissed('lowHeel')"><span class="contact-label"><span class="heel-label">Low</span><span class="heel-label">Heel</span></span></button>
<div class="contact-made-wrap">
<button id="contact-made" class="contact-made" type="button" onclick="recordContactMade()">SWEET SPOT</button>
</div>
</div>
</div>
</div>
</div>

</div>

<div class="mishit-panel">
<div class="mishit-row">
<button class="mishit-btn duff-btn" type="button" onclick="recordDuff()">&#x1F4A9; Duff</button>
<button class="mishit-btn shank-btn" type="button" onclick="recordShank()">&#x1F92C; Shank</button>
<button class="mishit-btn skull-btn" type="button" onclick="recordSkull()">&#x1F480; Skull</button>
</div>
</div>

<div class="stats-panel">
<div class="stats combined-stats">
<p>✅ Made: <span id="statsMade">0</span> | ⛔ Missed: <span id="statsMissed">0</span></p>
<p>🟢 Center: <span id="statsCenter">0</span> | 🚫 Off-Center: <span id="statsOffCenter">0</span></p>
<p>🚩 Make %: <span id="statsMakePercent">0</span>% | 💥 Flush %: <span id="statsFlushPercent">0</span>%</p>
<p><span id="statsStreakTitle">Streak</span>: <span id="statsStreak">0</span> <span id="statsStreakLabel"></span></p>
<p>Duffs: <span id="statsDuffs">0</span><span id="statsDuffMarks"></span> | Shanks: <span id="statsShanks">0</span><span id="statsShankMarks"></span> | Skulls: <span id="statsSkulls">0</span><span id="statsSkullMarks"></span></p>
</div>
</div>

<div id="targetBadge" class="badge manual-badge"></div>

<div class="session-actions">

function isWedgeToggleClub(club){
 const label=normalizeClubName(club)
 return WEDGE_CLUBS.includes(label)||label.includes("W")||label.includes("deg")||label.includes("°")
}
function getWedgeToggleClubs(){return ALL_CLUBS.filter(isWedgeToggleClub)}
function isIronToggleClub(club){
 const label=normalizeClubName(club)
 if(/^d$/i.test(label)||/^driver$/i.test(label)) return false
 return IRON_CLUBS.includes(label)||label.includes("i")||label.includes("I")
}
function getIronToggleClubs(){return ALL_CLUBS.filter(isIronToggleClub)}
function isHybridWoodToggleClub(club){
 const label=normalizeClubName(club)
 return HYBRID_WOOD_CLUBS.includes(label)||label.includes("w")||label.includes("h")||label.includes("H")||/^d$/i.test(label)||/^driver$/i.test(label)
}
function getHybridWoodToggleClubs(){return ALL_CLUBS.filter(isHybridWoodToggleClub)}
function getCarrySortedClubs(clubs=ALL_CLUBS,carryMap=carryYardages){
 return Array.from(new Set(clubs.map(normalizeClubName).filter(Boolean))).sort((a,b)=>{
  const carryDiff=(Number(carryMap[a])||0)-(Number(carryMap[b])||0)
  if(carryDiff!==0) return carryDiff
  return a.localeCompare(b,undefined,{numeric:true,sensitivity:"base"})
 })
}
function getOrderedClubCatalog(clubs=ALL_CLUBS,carryMap=carryYardages){
 const uniqueClubs=Array.from(new Set(clubs.map(normalizeClubName).filter(Boolean)))
 const baseOrdered=BASE_CLUBS.filter(club=>uniqueClubs.includes(club))
 const customOrdered=uniqueClubs.filter(club=>!BASE_CLUBS.includes(club)).sort((a,b)=>{
  const carryDiff=(Number(carryMap[a])||0)-(Number(carryMap[b])||0)
  if(carryDiff!==0) return carryDiff
  return a.localeCompare(b,undefined,{numeric:true,sensitivity:"base"})
 })
 return [...baseOrdered,...customOrdered]
}
function setClubCatalog(clubs){ALL_CLUBS.splice(0,ALL_CLUBS.length,...getOrderedClubCatalog(clubs))}

  return normalized.length ? normalized : BASE_CLUBS.slice()
 }catch{return BASE_CLUBS.slice()}
}

function normalizeClubVisibility(saved,fallback=DEFAULT_VISIBLE_CLUBS){
 const map={}
 ALL_CLUBS.forEach(club=>{map[club]=fallback[club] ?? true})
 if(saved&&typeof saved==="object") ALL_CLUBS.forEach(club=>{if(typeof saved[club]==="boolean") map[club]=saved[club]})
 return map
}
function normalizeDistanceVisibility(saved,fallback=DEFAULT_VISIBLE_DISTANCES){
 const map={...fallback}
 if(saved&&typeof saved==="object") ALL_DISTANCE_OPTIONS.forEach(distance=>{if(typeof saved[distance]==="boolean") map[distance]=saved[distance]})
 return map
}
function normalizeDistanceSetupRange(saved,fallback=DEFAULT_DISTANCE_SETUP_RANGE){
 const safeFallback=normalizeDistanceSetupRangeBase(fallback)
 if(!saved||typeof saved!=="object") return safeFallback
 let min=normalizeDistanceSetupValue(saved.min,safeFallback.min)
 let max=normalizeDistanceSetupValue(saved.max,safeFallback.max)
 if(min>max){
  if(saved.min!=null&&saved.max==null) max=min
  else if(saved.max!=null&&saved.min==null) min=max
  else{min=safeFallback.min;max=safeFallback.max}
 }
 return {min,max}
}
function normalizeDistanceSetupRangeBase(range){
 const min=normalizeDistanceSetupValue(range&&range.min,DEFAULT_DISTANCE_SETUP_RANGE.min)
 const max=normalizeDistanceSetupValue(range&&range.max,DEFAULT_DISTANCE_SETUP_RANGE.max)
 return min<=max ? {min,max} : {...DEFAULT_DISTANCE_SETUP_RANGE}
}
function normalizeDistanceSetupValue(value,fallback){
 const numeric=Number(value)
 if(!Number.isFinite(numeric)) return fallback
 return Math.max(RANGE_DISTANCE_MIN,Math.min(RANGE_DISTANCE_MAX,Math.round(numeric/5)*5))
}
function normalizeCarryYardages(saved){
 const map={}
 ALL_CLUBS.forEach(club=>{if(Number.isFinite(DEFAULT_CARRY_YARDAGES[club])) map[club]=DEFAULT_CARRY_YARDAGES[club]})
 if(saved&&typeof saved==="object") ALL_CLUBS.forEach(club=>{
  const value=Number(saved[club])
  if(Number.isFinite(value)&&value>0) map[club]=Math.round(value)
 })
 return map
}

function getModeBaseClubs(mode=targetSetMode){
 if(mode==="wedge"){
  const wedgeCutoff=Number(carryYardages["PW"])||130
  return ALL_CLUBS.filter(club=>WEDGE_CLUBS.includes(club)||(!BASE_CLUBS.includes(club)&&(Number(carryYardages[club])||0)<=wedgeCutoff))
 }
 return ALL_CLUBS.slice()
}

function getSelectableClubs(mode=targetSetMode){
 const baseClubs=getModeBaseClubs(mode)
 const visibleClubs=baseClubs.filter(club=>clubVisibility[club]!==false)
 if(visibleClubs.length) return visibleClubs
 const defaultClubs=baseClubs.filter(club=>defaultClubVisibility[club]!==false)
 return defaultClubs.length ? defaultClubs : baseClubs.slice()
}
function hasVisibleWedgeClubs(){return getSelectableClubs("wedge").length>0}
function hasVisibleClubs(){return ALL_CLUBS.some(club=>clubVisibility[club]!==false)}
function areAllClubsOn(clubs){
 const activeClubs=clubs.filter(club=>ALL_CLUBS.includes(club))
 return activeClubs.length>0&&activeClubs.every(club=>clubVisibility[club]!==false)
}
function areAllDistancesOn(distances){return distances.length>0&&distances.every(distance=>distanceVisibility[distance]!==false)}
function getDistanceSetupDisplayOptions(){return ALL_DISTANCE_OPTIONS.filter(distance=>distance>=distanceSetupRange.min&&distance<=distanceSetupRange.max)}
function getSelectedClubCarryBounds(mode=targetSetMode){
 const carries=getSelectableClubs(mode).map(club=>Number(carryYardages[club])||0).filter(carry=>carry>0).map(carry=>clampRangeDistance(carry))
 if(!carries.length) return null
 return {min:Math.min(...carries),max:Math.max(...carries)}
}
function getModeDistanceOptions(mode=targetSetMode){
 const carryBounds=getSelectedClubCarryBounds(mode)
 if(mode==="range"){
  if(!carryBounds) return ALL_DISTANCE_OPTIONS.slice()
  return ALL_DISTANCE_OPTIONS.filter(distance=>distance>=carryBounds.min&&distance<=carryBounds.max)
 }
 let distances=getDistanceSetupDisplayOptions()
 if(mode==="wedge"){
  const maxCarry=carryBounds&&carryBounds.min||0
  let cappedDistances=distances.filter(distance=>distance<=maxCarry)
  if(!cappedDistances.length) cappedDistances=ALL_DISTANCE_OPTIONS.filter(distance=>distance<=maxCarry)
  distances=cappedDistances.length ? cappedDistances : [MODE_CONFIG.wedge.defaultDistance]
 }
 return distances
}
function getRangeRandomDistanceOptions(){
 const allowedDistances=getSelectableDistances("range")
 const adjustedCarries=getSelectableClubs("range").map(club=>clampRangeDistance(getAdjustedRangeCarry(club)||carryYardages[club]||0)).filter(distance=>distance>=RANGE_DISTANCE_MIN&&distance<=RANGE_DISTANCE_MAX)
 if(!adjustedCarries.length) return allowedDistances.length ? allowedDistances : ALL_DISTANCE_OPTIONS.slice()
 const minDistance=Math.min(...adjustedCarries)
 const maxDistance=Math.max(...adjustedCarries)
 const rangedDistances=allowedDistances.filter(distance=>distance>=minDistance&&distance<=maxDistance)
 if(rangedDistances.length) return rangedDistances
 if(allowedDistances.length) return [getClosestDistanceOption((minDistance+maxDistance)/2,allowedDistances)]
 return [minDistance]
}
function getSelectableDistances(mode=targetSetMode){
 const baseDistances=getModeDistanceOptions(mode)
 const visibleDistances=baseDistances.filter(distance=>distanceVisibility[distance]!==false)
 if(visibleDistances.length) return visibleDistances
 const defaultDistances=baseDistances.filter(distance=>defaultDistanceVisibility[distance]!==false)
 return defaultDistances.length ? defaultDistances : baseDistances.slice()
}
function getClosestDistanceOption(target,distances=getSelectableDistances()){
 if(!distances.length) return MODE_CONFIG.wedge.defaultDistance
 return distances.slice().sort((a,b)=>{
  const diffA=Math.abs(a-target)
  const diffB=Math.abs(b-target)
  if(diffA!==diffB) return diffA-diffB
  return a-b
 })[0]
}
function getValidatedClubForMode(mode,club){
 const clubs=getSelectableClubs(mode)
 if(!clubs.length) return getModeBaseClubs(mode).includes(club) ? club : MODE_CONFIG[mode].defaultClub
 if(clubs.includes(club)) return club
 const defaultClub=MODE_CONFIG[mode].defaultClub
 if(clubs.includes(defaultClub)) return defaultClub
 return clubs[0]
}
function getValidatedDistance(distance,mode=targetSetMode){
 const visibleDistances=getSelectableDistances(mode)
 if(visibleDistances.includes(Number(distance))) return Number(distance)
 return getClosestDistanceOption(Number(distance)||MODE_CONFIG.wedge.defaultDistance,visibleDistances)
}
function getValidatedRangeRandomDistance(distance){
 const randomDistances=getRangeRandomDistanceOptions()
 if(randomDistances.includes(Number(distance))) return Number(distance)
 return getClosestDistanceOption(Number(distance)||MODE_CONFIG.range.defaultDistance,randomDistances)
}
function normalizeShot(shot){
 const safeShot=shot&&typeof shot==="object" ? clone(shot) : {}
 safeShot.club=ALL_CLUBS.includes(safeShot.club)?safeShot.club:MODE_CONFIG.wedge.defaultClub
 safeShot.distance=getClosestDistanceOption(Number(safeShot.distance)||MODE_CONFIG.wedge.defaultDistance,ALL_DISTANCE_OPTIONS)
 safeShot.mode=safeShot.mode==="random"?"random":"manual"
 safeShot.targetSetMode=TARGET_SET_MODES.includes(safeShot.targetSetMode)?safeShot.targetSetMode:(Number(safeShot.distance)>80?"range":"wedge")
 return safeShot
}

function formatWindArrowSpeed(signed){if(signed>0)return HEAD_WIND_ARROW+" "+signed+" mph";if(signed<0)return TAIL_WIND_ARROW+" "+Math.abs(signed)+" mph";return "0 mph"}

function getRangeClubCategory(club){
 if(WEDGE_CLUBS.includes(club)) return "wedge"
 if(IRON_CLUBS.includes(club)) return "iron"
 if(HYBRID_WOOD_CLUBS.includes(club)||club==="Driver") return "woodHybrid"
 const carry=Number(carryYardages[club])||0
 const wedgeMax=Number(carryYardages["PW"])||130
 const ironMax=Number(carryYardages["3i"])||200
 if(carry&&carry<=wedgeMax) return "wedge"
 if(carry&&carry<=ironMax) return "iron"
 return "woodHybrid"
}
function getAdjustedRangeCarry(club){
 const baseCarry=carryYardages[club]||0
 if(!baseCarry) return baseCarry
 const category=getRangeClubCategory(club)
 let adjustedCarry=baseCarry
 if(rangeWindSpeed){
  const steps=Math.abs(rangeWindSpeed)/5
  const windRates=RANGE_WIND_ADJUSTMENTS[category]
  if(windRates){
   if(rangeWindSpeed>0) adjustedCarry=Math.max(0,adjustedCarry*(1-windRates.head*steps))
   else if(rangeWindSpeed<0) adjustedCarry=adjustedCarry*(1+windRates.tail*steps)
  }
 }
 if(rangeTemperature!==RANGE_DEFAULT_TEMP){
  const tempSteps=(rangeTemperature-RANGE_DEFAULT_TEMP)/RANGE_TEMP_STEP
  const tempRate=RANGE_TEMP_ADJUSTMENTS[category]||0
  adjustedCarry=adjustedCarry*(1+tempRate*tempSteps)
 }
 return Math.max(0,adjustedCarry)
}

function ensureStatsShape(obj,trackerKey){

 TARGET_SET_MODES.forEach(mode=>ALL_CLUBS.forEach(club=>ALL_DISTANCES.forEach(d=>{
  const bucket=map[mode][club][d]||{}
  const normalized=createMissDir(trackerKey)
  TRACKERS[trackerKey].missKeys.forEach(key=>{normalized[key]=Number(bucket.missDir&&bucket.missDir[key])||0})
  map[mode][club][d]={made:Number(bucket.made)||0,missed:Number(bucket.missed)||0,duffs:Number(bucket.duffs)||0,shanks:Number(bucket.shanks)||0,skulls:Number(bucket.skulls)||0,missDir:normalized}
 })))

}

function buildSessionStateFromShots(history,date=new Date().toISOString()){
 const state=createTrackerStateSnapshot()
 const sessionShots=clone(history).map(normalizeShot)
 const touchedTargets=new Set()
 sessionShots.forEach(shot=>{
  const targetMode=getShotTargetMode(shot)
  applyShotResultToStatsMap(state.statsMapByTracker,"accuracy",shot.accuracy,targetMode,shot.club,shot.distance)
  applyShotResultToStatsMap(state.statsMapByTracker,"contact",shot.contact,targetMode,shot.club,shot.distance)
  touchedTargets.add([targetMode,shot.club,shot.distance].join("|"))
 })
 touchedTargets.forEach(key=>{
  const [targetMode,club,distance]=key.split("|")
  recomputeTrackerStateHistoryFor(state,sessionShots,targetMode,club,Number(distance))
 })
 return {
  date,
  accuracyStats:state.statsMapByTracker.accuracy,
  accuracyBestStreaks:state.bestStreaksByTracker.accuracy,
  contactStats:state.statsMapByTracker.contact,
  contactBestStreaks:state.bestStreaksByTracker.contact,
  shots:sessionShots,
  accuracySummary:summarizeStats(state.statsMapByTracker.accuracy),
  contactSummary:summarizeStats(state.statsMapByTracker.contact)
 }
}
function normalizeSession(session){

 if((!safeSession.accuracyStats||!safeSession.contactStats||!safeSession.accuracyBestStreaks||!safeSession.contactBestStreaks)&&sessionShots.length){
  const rebuilt=buildSessionStateFromShots(sessionShots,safeSession.date||new Date().toISOString())
  return {
   date:rebuilt.date,
   accuracyStats:rebuilt.accuracyStats,
   contactStats:rebuilt.contactStats,
   accuracyBestStreaks:rebuilt.accuracyBestStreaks,
   contactBestStreaks:rebuilt.contactBestStreaks,
   shots:rebuilt.shots,
   accuracySummary:safeSession.accuracySummary||rebuilt.accuracySummary,
   contactSummary:safeSession.contactSummary||rebuilt.contactSummary
  }
 }
 const accuracyStats=ensureStatsShape(safeSession.accuracyStats, "accuracy")
 const contactStats=ensureStatsShape(safeSession.contactStats, "contact")
 return {
  date:safeSession.date||new Date().toISOString(),
  accuracyStats:accuracyStats,
  contactStats:contactStats,
  accuracyBestStreaks:ensureCounterShape(safeSession.accuracyBestStreaks),

 }
}

function summarizeShotResults(history,trackerKey){
 let made=0,missed=0,duffs=0,shanks=0,skulls=0
 history.forEach(shot=>{
  const result=shot[trackerKey]
  if(!result) return
  if(result.type==="made"){made++;return}
  missed++
  if(result.type==="duff") duffs++
  if(result.type==="shank") shanks++
  if(result.type==="skull") skulls++
 })
 return {made,missed,duffs,shanks,skulls,total:made+missed}
}
function isPerfectShot(shot){

}
function summarizeShotSequence(history){

  if(isPerfectShot(shot)){streak++;if(streak>best)best=streak}else streak=0
 })
 return {streak,best}
}

}

  skulls+=bucket.skulls||0

}

function commitSetupPanelPendingValues(){
 const panel=$("setupPanel")
 if(!panel||!activeSetupPanel) return
 let carryChanged=false
 panel.querySelectorAll("[data-carry-club]").forEach(input=>{
  const club=input.getAttribute("data-carry-club")
  const nextValue=Math.round(Number(input.value))
  if(!club||!Number.isFinite(nextValue)||nextValue<=0||carryYardages[club]===nextValue) return
  carryYardages[club]=nextValue
  carryChanged=true
 })
 let rangeChanged=false
 const minInput=panel.querySelector("[data-distance-range='min']")
 const maxInput=panel.querySelector("[data-distance-range='max']")
 if(minInput&&maxInput){
  let nextMin=normalizeDistanceSetupValue(minInput.value,distanceSetupRange.min)
  let nextMax=normalizeDistanceSetupValue(maxInput.value,distanceSetupRange.max)
  const minChanged=nextMin!==distanceSetupRange.min
  const maxChanged=nextMax!==distanceSetupRange.max
  if(nextMin>nextMax){
   if(minChanged&&!maxChanged) nextMax=nextMin
   else if(maxChanged&&!minChanged) nextMin=nextMax
   else nextMax=nextMin
  }
  const nextRange=normalizeDistanceSetupRange({min:nextMin,max:nextMax})
  if(nextRange.min!==distanceSetupRange.min||nextRange.max!==distanceSetupRange.max){
   distanceSetupRange=nextRange
   rangeChanged=true
  }
 }
 if(carryChanged) saveCarryYardages()
 if(rangeChanged) saveDistanceSetupRange()
 if(carryChanged||rangeChanged) applySetupChanges()
}

function applyShotResultToStatsMap(statsMap,trackerKey,result,mode,club,distance){
 const bucket=statsMap[trackerKey][mode][club][distance]
 if(result.type==="made"){
  bucket.made++
  return
 }
 bucket.missed++
 if(result.type==="missed"&&result.dir) bucket.missDir[result.dir]++
 if(result.type==="duff") bucket.duffs++
 if(result.type==="shank") bucket.shanks++
 if(result.type==="skull") bucket.skulls++
}
function applyShotResultToTracker(trackerKey,result,mode,club,distance){
 applyShotResultToStatsMap(statsMapByTracker,trackerKey,result,mode,club,distance)
}
function removeShotResultFromTracker(trackerKey,result,mode,club,distance){
 const bucket=statsMapByTracker[trackerKey][mode][club][distance]
 if(result.type==="made"&&bucket.made>0) bucket.made--
 if(result.type!=="made"&&bucket.missed>0) bucket.missed--
 if(result.type==="missed"&&result.dir&&bucket.missDir[result.dir]>0) bucket.missDir[result.dir]--
 if(result.type==="duff"&&bucket.duffs>0) bucket.duffs--
 if(result.type==="shank"&&bucket.shanks>0) bucket.shanks--
 if(result.type==="skull"&&bucket.skulls>0) bucket.skulls--
}
function recomputeHistoryFor(targetMode,club,distance){
 let streak=0,best=0
 shotHistory.forEach(shot=>{
  if(getShotTargetMode(shot)!==targetMode||shot.club!==club||shot.distance!==distance) return
  if(isPerfectShot(shot)){streak++;if(streak>best)best=streak}else streak=0
 })
 TRACKER_KEYS.forEach(trackerKey=>{
  streaksByTracker[trackerKey][targetMode][club][distance]=streak
  bestStreaksByTracker[trackerKey][targetMode][club][distance]=best
 })
}
function recomputeTrackerStateHistoryFor(state,history,targetMode,club,distance){
 let streak=0,best=0
 history.forEach(shot=>{
  if(getShotTargetMode(shot)!==targetMode||shot.club!==club||shot.distance!==distance) return
  if(isPerfectShot(shot)){streak++;if(streak>best)best=streak}else streak=0
 })
 TRACKER_KEYS.forEach(trackerKey=>{
  state.streaksByTracker[trackerKey][targetMode][club][distance]=streak
  state.bestStreaksByTracker[trackerKey][targetMode][club][distance]=best
 })
}
function rebuildLiveTrackingFromHistory(){
 resetLiveTrackingState()
 const touchedTargets=new Set()
 shotHistory.forEach(shot=>{
  const targetMode=getShotTargetMode(shot)
  applyShotResultToTracker("accuracy",shot.accuracy,targetMode,shot.club,shot.distance)
  applyShotResultToTracker("contact",shot.contact,targetMode,shot.club,shot.distance)
  touchedTargets.add([targetMode,shot.club,shot.distance].join("|"))
 })
 touchedTargets.forEach(key=>{
  const [targetMode,club,distance]=key.split("|")
  recomputeHistoryFor(targetMode,club,Number(distance))
 })
}
function buildSessionSnapshotFromShots(history,date=new Date().toISOString()){
 return normalizeSession(buildSessionStateFromShots(history,date))
}
function hasTrackedSessionData(){
 if(shotHistory.length) return true
 return TRACKER_KEYS.some(trackerKey=>TARGET_SET_MODES.some(mode=>ALL_CLUBS.some(club=>ALL_DISTANCES.some(distance=>{
  const bucket=statsMapByTracker[trackerKey][mode][club][distance]
  return !!((bucket.made||0)||(bucket.missed||0)||(bucket.duffs||0)||(bucket.shanks||0)||(bucket.skulls||0))
 }))))
}
function buildCurrentSessionSnapshot(){
 rebuildLiveTrackingFromHistory()
 return normalizeSession({
  date:new Date().toISOString(),
  shots:clone(shotHistory),
  accuracySummary:summarizeStats(statsMapByTracker.accuracy),
  contactSummary:summarizeStats(statsMapByTracker.contact)
 })
}
function refreshHistoryPanel(){
 sessions=loadSessions()
 renderHistory()
}
function flashForShot(resultAccuracy,resultContact){
 const isGreen=resultAccuracy.type==="made"&&resultContact.type==="made"
 document.body.classList.remove(isGreen?"flash-red":"flash-green")
 document.body.classList.add(isGreen?"flash-green":"flash-red")
 setTimeout(()=>document.body.classList.remove(isGreen?"flash-green":"flash-red"),150)
}
function commitShot(resultAccuracy,resultContact){
 const shot=buildShotPayload(resultAccuracy,resultContact)
 applyShotResultToTracker("accuracy",resultAccuracy,shot.targetSetMode,shot.club,shot.distance)
 applyShotResultToTracker("contact",resultContact,shot.targetSetMode,shot.club,shot.distance)
 shotHistory.push(shot)
 recomputeHistoryFor(shot.targetSetMode,shot.club,shot.distance)
 flashForShot(resultAccuracy,resultContact)
 clearPendingSelections()
 persistLiveState()
 advancePracticeTarget()
 updateStats()
}
function tryCommitPendingShot(){if(pendingShot.accuracy&&pendingShot.contact) commitShot(pendingShot.accuracy,pendingShot.contact); else updatePendingVisuals()}
function recordMade(){pendingShot.accuracy={type:"made"};tryCommitPendingShot()}
function recordMissed(dir){pendingShot.accuracy={type:"missed",dir};tryCommitPendingShot()}
function recordContactMade(){pendingShot.contact={type:"made"};tryCommitPendingShot()}
function recordContactMissed(dir){pendingShot.contact={type:"missed",dir};tryCommitPendingShot()}
function recordDuff(){commitShot({type:"duff"},{type:"duff"})}
function recordShank(){commitShot({type:"shank"},{type:"shank"})}
function recordSkull(){commitShot({type:"skull"},{type:"skull"})}
function advancePracticeTarget(){if(getActivePracticeMode()==="random") pickRandomTarget()}
function renderTrackerStats(trackerKey){
 const modeHistory=getModeShotHistory(getActivePracticeMode(),targetSetMode)
 const modeStats=summarizeShotResults(modeHistory,trackerKey)
 const shotSummary=summarizeShotSequence(modeHistory)
 const currentPct=modeStats.total?Math.round(modeStats.made/modeStats.total*100):0
 const streakValue=shotSummary.streak
 return {
  modeStats,
  currentPct,
  made:modeStats.made,
  missed:modeStats.missed,
  duffs:modeStats.duffs,
  shanks:modeStats.shanks,
  skulls:modeStats.skulls,
  streakValue
 }
}
function updateStats(){
 const activePracticeMode=getActivePracticeMode()
 const isRandom=activePracticeMode==="random"
 const rangeActive=isRangeMode()
 const badge=$("targetBadge")
 const totalShots=shotHistory.length
 const accuracyModeStats=renderTrackerStats("accuracy")
 const contactModeStats=renderTrackerStats("contact")
 const streakValue=accuracyModeStats.streakValue
 let fireCount=0
 if(streakValue>=10) fireCount=5
 else if(streakValue>=7) fireCount=4
 else if(streakValue>=5) fireCount=3
 else if(streakValue>=3) fireCount=2
 else if(streakValue>=1) fireCount=1
 $("statsMade").textContent=accuracyModeStats.made
 $("statsMissed").textContent=accuracyModeStats.missed
 $("statsCenter").textContent=contactModeStats.made
 $("statsOffCenter").textContent=contactModeStats.missed
 $("statsMakePercent").textContent=accuracyModeStats.currentPct
 $("statsFlushPercent").textContent=contactModeStats.currentPct
 $("statsStreakTitle").textContent=getStreakEmojis(streakValue)
 $("statsStreak").textContent=streakValue
 $("statsStreakLabel").textContent=EMOJI.fire.repeat(fireCount)
 $("statsDuffs").textContent=accuracyModeStats.duffs
 $("statsDuffMarks").textContent=accuracyModeStats.duffs ? " "+EMOJI.duffMark.repeat(accuracyModeStats.duffs) : ""
 $("statsShanks").textContent=accuracyModeStats.shanks
 $("statsShankMarks").textContent=accuracyModeStats.shanks ? " "+EMOJI.shankMark.repeat(accuracyModeStats.shanks) : ""
 $("statsSkulls").textContent=accuracyModeStats.skulls
 $("statsSkullMarks").textContent=accuracyModeStats.skulls ? " "+EMOJI.skullMark.repeat(accuracyModeStats.skulls) : ""
 if(rangeActive){
  badge.className="badge random-badge"
  badge.innerHTML='<div class="badge-content">Current Target:<br>'+EMOJI.target+' '+formatClubLabel(currentClub)+' - '+currentDistance+'yd<br>'+EMOJI.weather+' '+formatSignedWindLabel(getSignedWindSpeed())+', '+formatRangeTemperature()+'<br><span class="random-total-line">'+EMOJI.total+' Total Shots: '+totalShots+'</span></div>'
 }else if(isRandom){
  badge.className="badge random-badge"
  badge.innerHTML='<div class="badge-content">Current Target:<br>'+EMOJI.target+' '+formatClubLabel(currentClub)+' - '+currentDistance+'yd ('+formatTargetFeetLabel(currentDistance,"wedge")+')<br><span class="random-total-line">'+EMOJI.total+' Total Shots: '+totalShots+'</span></div>'
 }else{
  const upAndDownValue=getUpAndDownValue(currentDistance,"wedge")
  badge.className="badge manual-badge"
  badge.innerHTML='<div class="badge-content">'+EMOJI.target+' Target: '+formatTargetFeetLabel(currentDistance,"wedge")+'<br>'+EMOJI.medal+' Up and Down: '+formatPercent(upAndDownValue)+(Number.isFinite(Number(upAndDownValue))?"%":"")+'<br><span class="random-total-line">'+EMOJI.total+' Total Shots: '+totalShots+'</span></div>'
 }
 updatePendingVisuals()
}
function newSession(){
 if(hasTrackedSessionData()){
  saveSessions(loadSessions().concat([buildCurrentSessionSnapshot()]))
 }
 resetLiveTrackingState()
 shotHistory=[]
 clearPendingSelections()
 persistLiveState()
 if(getActivePracticeMode()==="random") pickRandomTarget()
 else syncCurrentSelection()
 updateStats()
 renderPracticeMode()
 refreshHistoryPanel()
 requestAnimationFrame(refreshHistoryPanel)
}
function findLastUndoableShotIndex(){
 const activePracticeMode=getActivePracticeMode()
 for(let i=shotHistory.length-1;i>=0;i--){
  const shot=shotHistory[i]
  if((shot.mode||"manual")===activePracticeMode&&getShotTargetMode(shot)===targetSetMode) return i
 }
 return -1
}
function undoShot(){
 const undoIndex=findLastUndoableShotIndex()
 if(undoIndex===-1) return
 const undoneShot=shotHistory[undoIndex]
 shotHistory=shotHistory.filter((_,index)=>index!==undoIndex)
 clearPendingSelections()
 rebuildLiveTrackingFromHistory()
 setTarget(undoneShot.club,undoneShot.distance)
 persistLiveState()
 updateStats()
 renderPracticeMode()
 refreshHistoryPanel()
}
function handleHistoryAction(){
 const sel=$("historyAction")
 const value=sel.value
 sel.value=""
 if(value==="delete"){
  if(confirm("Delete all session history and reset all stats?")){
   sessions=[]
   TRACKER_KEYS.forEach(trackerKey=>{
    statsMapByTracker[trackerKey]=defaultStats(trackerKey)
    streaksByTracker[trackerKey]=defaultCounters()
    bestStreaksByTracker[trackerKey]=defaultCounters()
   })
   shotHistory=[]
   clearPendingSelections()
   saveSessions()
   persistLiveState()
   updateStats()
   renderHistory()
  }
 }
 if(value==="export") exportHistoryCSV()
}
function getTrackerMissCsvHeaders(trackerKey,prefix){
 return TRACKERS[trackerKey].missKeys.map(key=>prefix+" "+TRACKERS[trackerKey].missLabels[key])
}
function getTrackerMissCsvValues(trackerKey,missDir){
 const normalized=createMissDir(trackerKey)
 TRACKERS[trackerKey].missKeys.forEach(key=>{normalized[key]=Number(missDir&&missDir[key])||0})
 return TRACKERS[trackerKey].missKeys.map(key=>normalized[key])
}
function formatTrackerMissSummary(trackerKey,missDir){
 const parts=TRACKERS[trackerKey].missKeys.map(key=>TRACKERS[trackerKey].missLabels[key]+": "+(Number(missDir&&missDir[key])||0))
 return TRACKERS[trackerKey].title+" - "+parts.join(" | ")
}
function exportHistoryCSV(){
 const rows=[[
  "Session","Date","Club","Yardage","Mode","Wind","Temp","Target ft",
  "Made","Missed","Make %",...getTrackerMissCsvHeaders("accuracy","Accuracy"),
  "Center","Off-Center","Flush %",...getTrackerMissCsvHeaders("contact","Contact"),
  "Best Streak",
  "Duffs","Shanks","Skulls"
 ]]
 const csvEscape=value=>{const text=String(value ?? "");return /[",\n]/.test(text) ? '"'+text.replace(/"/g,'""')+'"' : text}
 const pushRow=values=>rows.push(values.map(csvEscape).join(","))
 const fmt=(count,pct)=>count+" ("+pct+"%)"
 const exportSessions=sessions.slice()
 if(shotHistory.length){
  exportSessions.push(buildSessionSnapshotFromShots(shotHistory))
 }
 exportSessions.forEach((session,index)=>{
  const date=new Date(session.date).toLocaleDateString()
  const sessionBestStreak=getSessionBestStreak(session)
  const accuracyTotals={made:0,missed:0,duffs:0,shanks:0,skulls:0,missDir:createMissDir("accuracy")}
  const contactTotals={made:0,missed:0,duffs:0,shanks:0,skulls:0,missDir:createMissDir("contact")}
  ALL_CLUBS.forEach(club=>{
   TARGET_SET_MODES.forEach(mode=>{
    ALL_DISTANCES.forEach(distance=>{
     const accuracyBucket=session.accuracyStats[mode][club][distance]
     const contactBucket=session.contactStats[mode][club][distance]
     const accuracyCount=(accuracyBucket.made||0)+(accuracyBucket.missed||0)
     const contactCount=(contactBucket.made||0)+(contactBucket.missed||0)
     if(!accuracyCount&&!contactCount) return
     const windSummary=mode==="range" ? getRangeWindSummary(session.shots,club,distance) : ""
     const tempSummary=mode==="range" ? getRangeTempSummary(session.shots,club,distance) : ""
     const targetFeet=getTargetFeet(distance,mode)
     const accuracyPct=accuracyCount?Math.round((accuracyBucket.made||0)/accuracyCount*100):0
     const contactPct=contactCount?Math.round((contactBucket.made||0)/contactCount*100):0
     TRACKERS.accuracy.missKeys.forEach(key=>{accuracyTotals.missDir[key]+=accuracyBucket.missDir[key]||0})
     TRACKERS.contact.missKeys.forEach(key=>{contactTotals.missDir[key]+=contactBucket.missDir[key]||0})
     accuracyTotals.made+=accuracyBucket.made||0
     accuracyTotals.missed+=accuracyBucket.missed||0
     accuracyTotals.duffs+=accuracyBucket.duffs||0
     accuracyTotals.shanks+=accuracyBucket.shanks||0
     accuracyTotals.skulls+=accuracyBucket.skulls||0
     contactTotals.made+=contactBucket.made||0
     contactTotals.missed+=contactBucket.missed||0
     contactTotals.duffs+=contactBucket.duffs||0
     contactTotals.shanks+=contactBucket.shanks||0
     contactTotals.skulls+=contactBucket.skulls||0
     pushRow([
      index+1,date,formatClubLabel(club),distance+"yd",mode==="range"?"Range":"Wedge",windSummary,tempSummary,targetFeet!==""?targetFeet+"ft":"",
      accuracyBucket.made||0,accuracyBucket.missed||0,accuracyPct+"%",...getTrackerMissCsvValues("accuracy",accuracyBucket.missDir),
      contactBucket.made||0,contactBucket.missed||0,contactPct+"%",...getTrackerMissCsvValues("contact",contactBucket.missDir),
      getSessionTargetBestStreak(session,mode,club,distance),
      accuracyBucket.duffs||0,accuracyBucket.shanks||0,accuracyBucket.skulls||0
     ])
    })
   })
  })
  const accuracyPct=accuracyTotals.made+accuracyTotals.missed ? Math.round(accuracyTotals.made/(accuracyTotals.made+accuracyTotals.missed)*100) : 0
  const contactPct=contactTotals.made+contactTotals.missed ? Math.round(contactTotals.made/(contactTotals.made+contactTotals.missed)*100) : 0
  pushRow([
   index+1,date,"ALL","TOTAL",getModeLabel(hasRangeLabel(getSessionRangeModeLabel(session.accuracyStats))||hasRangeLabel(getSessionRangeModeLabel(session.contactStats)),hasWedgeLabel(getSessionRangeModeLabel(session.accuracyStats))||hasWedgeLabel(getSessionRangeModeLabel(session.contactStats))),
   "","","",
   accuracyTotals.made,accuracyTotals.missed,accuracyPct+"%",
   ...TRACKERS.accuracy.missKeys.map(key=>fmt(accuracyTotals.missDir[key],accuracyTotals.missed?Math.round(accuracyTotals.missDir[key]/accuracyTotals.missed*100):0)),
   contactTotals.made,contactTotals.missed,contactPct+"%",
   ...TRACKERS.contact.missKeys.map(key=>fmt(contactTotals.missDir[key],contactTotals.missed?Math.round(contactTotals.missDir[key]/contactTotals.missed*100):0)),
   sessionBestStreak,
   fmt(accuracyTotals.duffs,accuracyTotals.missed?Math.round(accuracyTotals.duffs/accuracyTotals.missed*100):0),
   fmt(accuracyTotals.shanks,accuracyTotals.missed?Math.round(accuracyTotals.shanks/accuracyTotals.missed*100):0),
   fmt(accuracyTotals.skulls,accuracyTotals.missed?Math.round(accuracyTotals.skulls/accuracyTotals.missed*100):0)
  ])
 })
 const csv=rows.join("\n")+"\n"
 const blob=new Blob([csv],{type:"text/csv"})
 const url=URL.createObjectURL(blob)
 const a=document.createElement("a")
 a.href=url
 a.download="forestroke-history.csv"
 a.click()
 URL.revokeObjectURL(url)
}
function deleteSession(index){
 if(!confirm("Delete this session?")) return
 sessions=sessions.filter((_,sessionIndex)=>sessionIndex!==index)
 saveSessions(sessions)
 refreshHistoryPanel()
}
function renderHistory(){
 sessions=loadSessions()
 const historyNode=$("history")
 historyNode.innerHTML=""
 if(!sessions.length){historyNode.innerHTML='<p style="opacity:.8">No sessions yet.</p>';return}
 sessions.slice().reverse().forEach((session,reversedIndex)=>{
  const index=sessions.length-1-reversedIndex
  const accuracyTotals=summarizeSessionTracker(session,"accuracy")
  const contactTotals=summarizeSessionTracker(session,"contact")
  const bestStreak=getSessionBestStreak(session)
  const wrapper=document.createElement("div")
  wrapper.className="history-wrapper"
  const card=document.createElement("div")
  card.className="history-card"
  const accordion=document.createElement("div")
  accordion.className="accordion"
  card.innerHTML="<strong>Session "+(index+1)+"</strong><br>"+new Date(session.date).toLocaleDateString()+" - Made "+accuracyTotals.pct+"% | Flush "+contactTotals.pct+"% ("+accuracyTotals.total+" shots)"
  card.onclick=()=>{accordion.style.display=accordion.style.display==="block"?"none":"block"}
  const summaryRow=document.createElement("div")
  summaryRow.className="history-block"
  summaryRow.innerHTML="<strong>Session Totals</strong>"+
   '<br><span class="subtle">Made: '+accuracyTotals.made+' | Missed: '+accuracyTotals.missed+'</span>'+
   '<br><span class="subtle">Center: '+contactTotals.made+' | Off-Center: '+contactTotals.missed+'</span>'+
   '<br><span class="subtle">Make %: '+accuracyTotals.pct+'% | Flush %: '+contactTotals.pct+'%</span>'+
   '<br><span class="subtle">Best Streak: '+bestStreak+'</span>'+
   '<br><span class="subtle">Duffs: '+accuracyTotals.duffs+' | Shanks: '+accuracyTotals.shanks+' | Skulls: '+accuracyTotals.skulls+'</span>'
  accordion.appendChild(summaryRow)
  ALL_CLUBS.forEach(club=>{
   TARGET_SET_MODES.forEach(mode=>{
    ALL_DISTANCES.forEach(distance=>{
     const accuracyBucket=session.accuracyStats[mode][club][distance]
     const contactBucket=session.contactStats[mode][club][distance]
     const accuracyCount=(accuracyBucket.made||0)+(accuracyBucket.missed||0)
     const contactCount=(contactBucket.made||0)+(contactBucket.missed||0)
     if(!accuracyCount&&!contactCount) return
     const row=document.createElement("div")
     row.className="history-block"
     const accuracyPct=accuracyCount?Math.round((accuracyBucket.made||0)/accuracyCount*100):0
     const contactPct=contactCount?Math.round((contactBucket.made||0)/contactCount*100):0
     const windSummary=mode==="range" ? getRangeWindSummary(session.shots,club,distance) : ""
     const tempSummary=mode==="range" ? getRangeTempSummary(session.shots,club,distance) : ""
     const targetFeetLabel=formatTargetFeetLabel(distance,mode)
     const upAndDown=getUpAndDownValue(distance,mode)
     const hasUpAndDown=Number.isFinite(Number(upAndDown))
     const earnedMark=mode==="wedge"&&hasUpAndDown&&accuracyPct>upAndDown ? " "+EMOJI.star : ""
     row.innerHTML="<strong>"+formatClubLabel(club)+" - "+distance+" yd ("+(mode==="range"?"Range":"Wedge")+"):</strong>"+
      (mode==="wedge" ? " "+targetFeetLabel+earnedMark : " Range Mode")+
      (mode==="wedge"
       ? '<br><span class="subtle">Up and Down: '+formatPercent(upAndDown)+(hasUpAndDown?"%":"")+'</span>'
       : '<br><span class="subtle">Wind: '+(windSummary||"Not recorded")+' | Temp: '+(tempSummary||"Not recorded")+'</span>')+
      '<br><span class="subtle">Accuracy: '+(accuracyBucket.made||0)+'/'+accuracyCount+' ('+accuracyPct+'%)</span>'+
      '<br><span class="subtle">'+formatTrackerMissSummary("accuracy",accuracyBucket.missDir)+'</span>'+
      '<br><span class="subtle">Contact: '+(contactBucket.made||0)+'/'+contactCount+' ('+contactPct+'%)</span>'+
      '<br><span class="subtle">'+formatTrackerMissSummary("contact",contactBucket.missDir)+'</span>'+
      '<br><span class="subtle">Mishits - Duffs: '+(accuracyBucket.duffs||0)+' | Shanks: '+(accuracyBucket.shanks||0)+' | Skulls: '+(accuracyBucket.skulls||0)+'</span>'
     accordion.appendChild(row)
    })
   })
  })
  const deleteButton=document.createElement("button")
  deleteButton.textContent=EMOJI.delete+" Delete Session"
  deleteButton.onclick=event=>{event.stopPropagation();deleteSession(index)}
  deleteButton.style="display:block;width:100%;margin-top:10px;background:#E34234;color:#000;padding:6px 10px;font-size:20px;font-weight:800;border:none;border-radius:12px;cursor:pointer;"
  accordion.appendChild(deleteButton)
  wrapper.append(card,accordion)
  historyNode.appendChild(wrapper)
 })
}
function initApp(){
 setClubCatalog(loadClubCatalog())
 defaultClubVisibility=loadDefaultClubVisibility()
 defaultDistanceVisibility=loadDefaultDistanceVisibility()
 defaultDistanceSetupRange=loadDefaultDistanceSetupRange()
 clubVisibility=loadClubVisibility()
 distanceVisibility=loadDistanceVisibility()
 distanceSetupRange=loadDistanceSetupRange()
 carryYardages=loadCarryYardages()
 TRACKER_KEYS.forEach(trackerKey=>{
  statsMapByTracker[trackerKey]=loadTrackerStats(trackerKey)
  streaksByTracker[trackerKey]=loadTrackerStreaks(trackerKey)
  bestStreaksByTracker[trackerKey]=loadTrackerBestStreaks(trackerKey)
 })
 const shouldCompactStoredSessions=storedSessionsNeedCompaction()
 sessions=loadSessions()
 if(shouldCompactStoredSessions) saveSessions(sessions)
 shotHistory=loadShotHistory()
 rebuildLiveTrackingFromHistory()
 const selectionState=loadSelectionState()
 modeSelections={wedge:selectionState.wedge}
 rangeSelections=selectionState.range
 practiceMode=loadPracticeMode()
 targetSetMode=loadTargetSetMode()
 rangeWindSpeed=loadRangeWindSpeed()
 rangeTemperature=loadRangeTemperature()
 syncSelectionsToConfiguration()
 persistLiveState()
 if(practiceMode==="random") pickRandomTarget()
 else syncCurrentSelection()
 refreshHistoryPanel()
 renderSetupPanel()
 renderPracticeMode()
 applyEmojiText()
 updateStats()
 window.addEventListener("resize",handleWindowResize)
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initApp)
else initApp()
</script>
