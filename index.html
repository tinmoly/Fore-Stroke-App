<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORE!STROKE Practice App</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b3d2e;color:#fff;margin:0;padding:20px}
body.flash-green{animation:flashGreen .15s ease-in-out}
body.flash-red{animation:flashRed .15s ease-in-out}

@keyframes flashGreen{from{background:#0b3d2e}to{background:#145a43}}
@keyframes flashRed{from{background:#0b3d2e}to{background:#6b2a2a}}

.card{background:#145a43;border-radius:14px;padding:20px;max-width:960px;margin:0 auto;box-shadow:0 10px 25px rgba(0,0,0,.3)}
h1,h2,h3{text-align:center;margin:0 0 10px}
h1{font-size:34px;letter-spacing:.04em}

.pill-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px}
.pill-btn{background:#1c7c5b;border:none;padding:10px 20px;border-radius:999px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap;font-size:20px}
.pill-btn.active{background:#2ecc71;color:#000}
.pill-btn:disabled{cursor:default;opacity:1}

.range-speed{display:flex;align-items:center;gap:2px;background:#1c7c5b;padding:6px;border-radius:999px}
.range-speed-value{min-width:74px;text-align:center;font-size:18px;font-weight:800}
.range-temp-value{min-width:68px}
.range-temp-stepper{gap:0;padding:6px 4px}
.range-speed-btn{border:none;border-radius:999px;background:#2ecc71;color:#000;font-size:22px;font-weight:800;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 #1e9e54}

.mode-card{margin-bottom:14px;padding:12px;border-radius:12px;background:#0e4f3a}
.mode-row{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;width:100%}
.mode-row.equal-buttons{flex-wrap:nowrap}
.mode-row.equal-buttons .mode-btn{flex:1;min-width:0}
.mode-btn{width:100%;display:block;border:none;border-radius:12px;padding:10px 20px;font-size:20px;font-weight:800;cursor:pointer;background:#8a8a8a;color:#000;white-space:normal;line-height:1.15;text-align:center;box-shadow:0 4px 0 #666}
.mode-btn.active{background:#2ecc71;box-shadow:0 4px 0 #1e9e54}
.mode-btn.target-set-btn{background:#2ecc71;box-shadow:0 4px 0 #1e9e54}
.mode-btn.target-set-btn.range-active{background:#1d5b86;color:#fff;box-shadow:0 5px 0 #154462}
.mode-btn:disabled{cursor:default;opacity:1}
.mode-target{margin:10px 0 14px;padding:10px;border-radius:10px;background:#1c7c5b;font-size:24px;font-weight:800;text-align:center}

.interface-window{background:#0e4f3a;border-radius:14px;padding:0;overflow:hidden;margin:14px 0}
.tracker-grid{display:flex;flex-wrap:wrap;gap:0;align-items:flex-start;justify-content:stretch;width:100%}
.tracker-panel{background:#145a43;border-radius:0;padding:0;display:flex;justify-content:center;align-items:center;overflow:hidden;flex:1 1 320px}
.accuracy-shell{width:256.5px;height:256.5px;display:flex;align-items:center;justify-content:center;margin:0}
.contact-shell{width:256.5px;height:174.6px;display:flex;align-items:center;justify-content:center;margin:6px}

.accuracy-ring{width:256.5px;height:256.5px;border-radius:50%;position:relative;margin:0;transform:rotate(45deg);transform-origin:center}
.accuracy-ring::before,.accuracy-ring::after{content:"";position:absolute;background:#000;opacity:.9;pointer-events:none;z-index:4}
.accuracy-ring::before{width:2px;height:100%;left:50%;top:0;transform:translateX(-50%) rotate(45deg)}
.accuracy-ring::after{width:2px;height:100%;left:50%;top:0;transform:translateX(-50%) rotate(-45deg)}
.accuracy-wedge{position:absolute;inset:0;border:none;border-radius:50%;background:#E34234;cursor:pointer;z-index:1;-webkit-mask:radial-gradient(circle at center,transparent 0 49.5px,black 50.4px);mask:radial-gradient(circle at center,transparent 0 49.5px,black 50.4px)}
.accuracy-wedge:hover{filter:brightness(1.1)}
.accuracy-wedge:active{transform:scale(.97);filter:brightness(.95)}
.accuracy-wedge.selected{background:#f06e63;box-shadow:inset 0 0 0 5.4px rgba(255,255,255,.55),0 0 0 3.6px rgba(255,255,255,.16)}
.accuracy-topright{clip-path:polygon(50% 50%,0% 0%,100% 0%)}
.accuracy-bottomleft{clip-path:polygon(50% 50%,100% 100%,0% 100%)}
.accuracy-topleft{clip-path:polygon(50% 50%,0% 100%,0% 0%)}
.accuracy-bottomright{clip-path:polygon(50% 50%,100% 0%,100% 100%)}
.accuracy-label-top,.accuracy-label-bottom,.accuracy-label-left,.accuracy-label-right{position:absolute;font-weight:800;color:#000;font-size:21.6px;line-height:1.05;z-index:5;pointer-events:none}
.accuracy-label-top{top:9px;left:50%;transform:translateX(-50%)}
.accuracy-label-bottom{bottom:9px;left:50%;transform:translateX(-50%)}
.accuracy-label-left{left:9px;top:50%;transform:translateY(-50%) rotate(-90deg)}
.accuracy-label-right{right:9px;top:50%;transform:translateY(-50%) rotate(270deg)}
.accuracy-made{width:99px;height:99px;border:none;border-radius:50%;background:#2ecc71;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:21.6px;font-weight:800;color:#000;box-shadow:2.7px 0 0 #1e9e54,0 2.7px 0 #1e9e54,0 9px 18px rgba(0,0,0,.35);border-bottom:2.7px solid #1e9e54;border-right:2.7px solid #1e9e54;cursor:pointer;text-align:center;line-height:1.1;position:absolute;top:50%;left:50%;transform:translate(calc(-50% - 3.6px),-52%) rotate(-45deg);z-index:6}
.accuracy-made.selected{box-shadow:0 0 0 5.4px rgba(255,255,255,.4),2.7px 0 0 #1e9e54,0 2.7px 0 #1e9e54,0 9px 18px rgba(0,0,0,.35)}
.accuracy-made:active{transform:translate(calc(-50% - 3.6px),-52%) rotate(-45deg) translateY(2.7px) scale(.97);box-shadow:.9px 0 0 #1e9e54,0 .9px 0 #1e9e54,0 5.4px 10.8px rgba(0,0,0,.35)}

.contact-ring{width:285px;height:194px;position:relative;margin:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr .7fr;overflow:hidden;border-radius:54px 40px 34px 62px;clip-path:polygon(8% 0,100% 28%,100% 100%,4% 100%,0 96%,0 10%,2% 3%);background:linear-gradient(180deg,rgba(255,255,255,.62) 0%,rgba(255,255,255,.16) 20%,rgba(0,0,0,.08) 100%),repeating-linear-gradient(180deg,transparent 0 17px,rgba(102,112,122,.22) 17px 19px),linear-gradient(145deg,#f8fbfd 0%,#e0e7ee 24%,#c0cad4 58%,#f5f8fb 100%);border:6px solid #d2dbe3;box-shadow:inset 0 0 0 2px rgba(255,255,255,.6),inset 0 -12px 16px rgba(84,95,107,.24),0 14px 28px rgba(0,0,0,.28);transform:scale(.9);transform-origin:center}
.contact-ring::before,.contact-ring::after{content:"";position:absolute;pointer-events:none}
.contact-ring::before{left:22.8px;top:-3px;width:267.81px;height:6px;background:#d2dbe3;border-radius:999px;transform-origin:left center;transform:rotate(11.74deg);z-index:3}
.contact-ring::after{inset:0;background:linear-gradient(rgba(48,55,64,.78),rgba(48,55,64,.78)) 50% 0/2px 100% no-repeat,linear-gradient(rgba(48,55,64,.78),rgba(48,55,64,.78)) 0 58.824%/100% 2px no-repeat;z-index:4}
.contact-wedge{position:relative;background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,rgba(166,176,186,.08) 100%);cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:800;color:#1d242b;font-size:20px;line-height:1.05;letter-spacing:.06em;text-shadow:0 1px 0 rgba(255,255,255,.72);overflow:hidden;border:none}
.contact-wedge:hover{filter:brightness(1.1)}
.contact-wedge:active{transform:scale(.97) translateY(3px);filter:brightness(.95)}
.contact-wedge.selected{box-shadow:inset 0 0 0 6px rgba(46,204,113,.6)}
.contact-label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:100%;text-align:center}
.contact-label span{font-size:21.6px;letter-spacing:0;line-height:1.05;color:#000;text-shadow:none}
.contact-topleft .contact-label,.contact-topright .contact-label{transform:translateY(18px)}
.toe-label{transform:translateX(-16px)}
.heel-label{transform:translateX(22px)}
.contact-topleft{grid-column:1;grid-row:1;border-top-left-radius:42px 34px;clip-path:inset(0 round 42px 0 0 0);margin-left:-12px;padding-left:12px}
.contact-topright{grid-column:2;grid-row:1;border-top-right-radius:26px 20px;clip-path:inset(0 round 0 26px 0 0)}
.contact-bottomleft{grid-column:1;grid-row:2;border-bottom-left-radius:48px 38px;clip-path:inset(0 round 0 0 0 48px);margin-left:-12px;padding-left:12px}
.contact-bottomright{grid-column:2;grid-row:2;border-bottom-right-radius:28px 22px;clip-path:inset(0 round 0 0 28px 0)}
.contact-made-wrap{position:absolute;inset:0;z-index:5;pointer-events:none}
.contact-made{width:99px;height:99px;border:none;border-radius:50%;background:#2ecc71;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:#000;box-shadow:3px 0 0 #1e9e54,0 3px 0 #1e9e54,0 10px 20px rgba(0,0,0,.35);border-bottom:3px solid #1e9e54;border-right:3px solid #1e9e54;cursor:pointer;text-align:center;line-height:1.05;position:absolute;top:58.824%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:auto;padding:0 8px}
.contact-made.selected{box-shadow:0 0 0 6px rgba(255,255,255,.4),3px 0 0 #1e9e54,0 3px 0 #1e9e54,0 10px 20px rgba(0,0,0,.35)}
.contact-made:active{transform:translate(-50%,-50%) translateY(3px) scale(.97);box-shadow:1px 0 0 #1e9e54,0 1px 0 #1e9e54,0 6px 12px rgba(0,0,0,.35)}

button:active:not(.accuracy-made):not(.contact-made):not(.accuracy-wedge):not(.contact-wedge){transform:translateY(3px) scale(.98);box-shadow:0 2px 0 rgba(0,0,0,.35)!important}

.stats{text-align:center;font-size:18px;margin-top:16px}
.stats p{margin:6px 0}
.stats-panel{margin-top:10px;padding:12px 14px 14px;border-radius:14px;background:#0e4f3a}
.combined-stats{margin-top:0;padding-top:0}
.subtle{opacity:.75;font-size:14px}

.mishit-panel{margin-top:10px;padding:14px;border-radius:12px;background:#1c7c5b}

.mishit-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;width:100%;margin-top:0}
.mishit-btn{width:100%;min-height:58px;display:flex;align-items:center;justify-content:center;color:#000;border:none;border-radius:12px;padding:6px 10px;font-size:20px;font-weight:800;line-height:1.1;box-shadow:0 6px 0 rgba(0,0,0,.25),0 10px 18px rgba(0,0,0,.25);cursor:pointer}
.skull-btn{background:#f4a261;box-shadow:0 6px 0 #c57f3d,0 10px 18px rgba(0,0,0,.25)}
.duff-btn{background:#e9c46a;box-shadow:0 6px 0 #b89445,0 10px 18px rgba(0,0,0,.25)}
.shank-btn{background:#8b5a2b;color:#fff;box-shadow:0 8px 0 #5f3d1c,0 10px 18px rgba(0,0,0,.25)}

.badge{margin-top:10px;padding:10px;border-radius:10px;background:#0e4f3a;font-size:20px;font-weight:800}
.badge.manual-badge{font-size:20px;font-weight:800}
.badge.random-badge{background:#1d5b86;color:#fff}
.badge-content{text-align:center}
.random-total-line{font-weight:400}

.session-actions{display:flex;justify-content:space-between;gap:16px;margin-top:16px;width:100%;position:relative;z-index:20;pointer-events:auto}
.action-btn{flex:1;color:#000;padding:8px 10px;font-size:20px;font-weight:800;border:none;border-radius:12px;cursor:pointer;position:relative;z-index:21;pointer-events:auto;touch-action:manipulation}
.new-session-btn{background:#0096FF;box-shadow:0 6px 0 #0074c7,0 14px 22px rgba(0,0,0,.45)}
.undo-btn{background:#8a8a8a;box-shadow:0 6px 0 #666,0 14px 22px rgba(0,0,0,.45)}

.history-header{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.history-card{padding:10px;background:#1c7c5b;border-radius:10px;cursor:pointer}
.history-wrapper{margin-bottom:10px}
.accordion{display:none;margin-top:8px;padding:10px;background:#0e4f3a;border-radius:10px}
.history-block{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.12)}
.history-block:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}

@media (max-width:840px){
 .session-actions{flex-direction:column}
 .accuracy-label-left{transform:translateY(-50%) rotate(-90deg)}
 .accuracy-label-right{transform:translateY(-50%) rotate(270deg)}
}

@media (orientation:landscape){
 .tracker-grid{flex-wrap:nowrap;align-items:stretch}
 .tracker-panel{align-self:stretch}
}
</style>
</head>
<body>
<div class="card">
<h1>FORE!STROKE</h1>

<div class="mode-card">
<div class="mode-row equal-buttons">
<button id="practiceModeBtn" class="mode-btn" onclick="togglePracticeMode()">Manual<br>Mode On</button>
<button id="targetSetBtn" class="mode-btn target-set-btn" onclick="toggleTargetSetMode()">Wedge<br>Mode On</button>
</div>
</div>

<div id="clubRow" class="pill-row"></div>
<div id="distanceRow" class="pill-row"></div>
<div id="modeTarget" class="mode-target">Current Shot:</div>

<div class="interface-window">
<div class="tracker-grid">
<div class="tracker-panel">
<div class="accuracy-shell">
<div class="accuracy-ring">
<button id="accuracy-longRight" class="accuracy-wedge accuracy-topright" type="button" onclick="recordMissed('longRight')"></button>
<button id="accuracy-shortLeft" class="accuracy-wedge accuracy-bottomleft" type="button" onclick="recordMissed('shortLeft')"></button>
<button id="accuracy-longLeft" class="accuracy-wedge accuracy-topleft" type="button" onclick="recordMissed('longLeft')"></button>
<button id="accuracy-shortRight" class="accuracy-wedge accuracy-bottomright" type="button" onclick="recordMissed('shortRight')"></button>
<span class="accuracy-label-top">Long<br>Right</span>
<span class="accuracy-label-bottom">Short<br>Left</span>
<span class="accuracy-label-left">Long<br>Left</span>
<span class="accuracy-label-right">Short<br>Right</span>
<button id="accuracy-made" class="accuracy-made" type="button" onclick="recordMade()">MADE</button>
</div>
</div>
</div>

<div class="tracker-panel">
<div class="contact-shell">
<div class="contact-ring">
<button id="contact-highToe" class="contact-wedge contact-topleft" type="button" onclick="recordContactMissed('highToe')"><span class="contact-label"><span class="toe-label">High</span><span class="toe-label">Toe</span></span></button>
<button id="contact-highHeel" class="contact-wedge contact-topright" type="button" onclick="recordContactMissed('highHeel')"><span class="contact-label"><span class="heel-label">High</span><span class="heel-label">Heel</span></span></button>
<button id="contact-lowToe" class="contact-wedge contact-bottomleft" type="button" onclick="recordContactMissed('lowToe')"><span class="contact-label"><span class="toe-label">Low</span><span class="toe-label">Toe</span></span></button>
<button id="contact-lowHeel" class="contact-wedge contact-bottomright" type="button" onclick="recordContactMissed('lowHeel')"><span class="contact-label"><span class="heel-label">Low</span><span class="heel-label">Heel</span></span></button>
<div class="contact-made-wrap">
<button id="contact-made" class="contact-made" type="button" onclick="recordContactMade()">SWEET SPOT</button>
</div>
</div>
</div>
</div>
</div>

</div>

<div class="mishit-panel">
<div class="mishit-row">
<button class="mishit-btn duff-btn" type="button" onclick="recordDuff()">💩 Duff</button>
<button class="mishit-btn shank-btn" type="button" onclick="recordShank()">🤬 Shank</button>
<button class="mishit-btn skull-btn" type="button" onclick="recordSkull()">💀 Skull</button>
</div>
</div>

<div class="stats-panel">
<div class="stats combined-stats">
<p>✅ Made: <span id="statsMade">0</span> | ⛔ Missed: <span id="statsMissed">0</span></p>
<p>🟢 Center: <span id="statsCenter">0</span> | 🚫 Off-Center: <span id="statsOffCenter">0</span></p>
<p>🚩 Make %: <span id="statsMakePercent">0</span>% | 💥 Flush %: <span id="statsFlushPercent">0</span>%</p>
<p><span id="statsStreakTitle">Streak</span>: <span id="statsStreak">0</span> <span id="statsStreakLabel"></span></p>
<p>Duffs: <span id="statsDuffs">0</span><span id="statsDuffMarks"></span> | Shanks: <span id="statsShanks">0</span><span id="statsShankMarks"></span> | Skulls: <span id="statsSkulls">0</span><span id="statsSkullMarks"></span></p>
</div>
</div>

<div id="targetBadge" class="badge manual-badge"></div>

<div class="session-actions">
<button id="newSessionBtn" class="action-btn new-session-btn" type="button" onclick="newSession()">🔄️ New Session</button>
<button id="undoBtn" class="action-btn undo-btn" type="button" onclick="undoShot()">↩️ Undo Last Shot</button>
</div>

<div class="history-header">
<h3 style="margin:0">📜Session History</h3>
<select id="historyAction" onchange="handleHistoryAction()" style="background:#1c7c5b;color:#fff;border:none;border-radius:8px;padding:6px 8px;font-weight:700">
<option value="">Actions</option>
<option value="export">📤Export All History</option>
<option value="delete">📵Clear All History</option>
</select>
</div>

<div id="history"><p style="opacity:.8">No sessions yet.</p></div>
</div>

<script>
const APP_STORAGE_PREFIX="FORE_STROKE"
const WEDGE_CLUBS=["62 deg","60 deg","58 deg","56 deg","54 deg","52 deg","UW","48 deg","PW"]
const WEDGE_DISTANCES=[10,15,20,25,30,35,40,45,50,55,60,65,70,75,80]
const RANGE_CLUBS=["62 deg","60 deg","58 deg","56 deg","54 deg","52 deg","UW","48 deg","PW","9i","8i","7i","6i","5i","4i","3i","4h","5h","4w","Driver"]
const RANGE_MANUAL_CLUBS=["62 deg","60 deg","58 deg","56 deg","54 deg","52 deg","UW","48 deg","PW","9i","8i","7i","6i","5i","4i","3i","5h","4h","4w","Driver"]
const RANGE_DISTANCES=Array.from({length:176},(_,i)=>85+i)
const RANGE_DISTANCE_MIN=RANGE_DISTANCES[0]
const RANGE_DISTANCE_MAX=RANGE_DISTANCES[RANGE_DISTANCES.length-1]
const RANGE_CARRY_YARDAGES={
 "62 deg":80,"60 deg":85,"58 deg":95,"56 deg":100,"54 deg":105,"52 deg":110,"UW":115,"48 deg":120,"PW":130,
 "9i":140,"8i":150,"7i":160,"6i":170,"5i":180,"4i":190,"3i":200,"5h":205,"4h":215,"3h":225,"4w":235,"Driver":250
}
const RANGE_RECOMMENDATION_WINDOW=5
const ALL_CLUBS=["62 deg","60 deg","58 deg","56 deg","54 deg","52 deg","UW","48 deg","PW","9i","8i","7i","6i","5i","4i","3i","3h","4h","5h","4w","5w","3w","Driver"]
const RANGE_WIND_ADJUSTMENTS={wedge:{head:0.02,tail:0.01},iron:{head:0.025,tail:0.015},woodHybrid:{head:0.03,tail:0.025}}
const RANGE_DEFAULT_TEMP=70
const RANGE_TEMP_MIN=50
const RANGE_TEMP_MAX=100
const RANGE_TEMP_STEP=5
const RANGE_TEMP_ADJUSTMENTS={wedge:0.007,iron:0.01,woodHybrid:0.013}
const ALL_DISTANCES=Array.from({length:RANGE_DISTANCE_MAX-WEDGE_DISTANCES[0]+1},(_,i)=>WEDGE_DISTANCES[0]+i)
const MODE_CONFIG={wedge:{clubs:WEDGE_CLUBS,distances:WEDGE_DISTANCES,defaultClub:"56 deg",defaultDistance:25},range:{clubs:RANGE_CLUBS,distances:RANGE_DISTANCES,defaultClub:"9i",defaultDistance:135}}
const PGA_PROXIMITY={10:6,15:8,20:10,25:12,30:15,35:18,40:21,45:24,50:27,55:30,60:33,65:36,70:39,75:42,80:45}
const UP_AND_DOWN={10:67,15:60,20:53,25:46,30:40,35:35,40:30,45:27,50:25,55:23,60:20,65:18,70:16,75:14,80:12}
const DEFAULT_TARGET_SET_MODE="wedge"
const TARGET_SET_MODES=["wedge","range"]
const DEFAULT_CLUB=MODE_CONFIG.wedge.defaultClub
const PRACTICE_MODE_KEY=APP_STORAGE_PREFIX+"_practiceMode"
const TARGET_SET_MODE_KEY=APP_STORAGE_PREFIX+"_targetSetMode"
const RANGE_WIND_SPEED_KEY=APP_STORAGE_PREFIX+"_rangeWindSpeed"
const RANGE_TEMP_KEY=APP_STORAGE_PREFIX+"_rangeTemp"
const SHOT_HISTORY_KEY=APP_STORAGE_PREFIX+"_shotHistory"
const SELECTION_STATE_KEY=APP_STORAGE_PREFIX+"_selectionState"
const SESSIONS_KEY=APP_STORAGE_PREFIX+"_sessions"

const TRACKERS={
 accuracy:{
  title:"Accuracy",
  goodLabel:"Made",
  missLabel:"Missed",
  percentLabel:"Make %",
  missKeys:["longLeft","longRight","shortLeft","shortRight"],
  missLabels:{longLeft:"Long Left",longRight:"Long Right",shortLeft:"Short Left",shortRight:"Short Right"},
  dom:{
   made:"accuracyMade",missed:"accuracyMissed",percent:"accuracyPercent",streakTitle:"accuracyStreakTitle",streak:"accuracyStreak",streakLabel:"accuracyStreakLabel",
   duffs:"accuracyDuffs",duffMarks:"accuracyDuffMarks",shanks:"accuracyShanks",shankMarks:"accuracyShankMarks",skulls:"accuracySkulls",skullMarks:"accuracySkullMarks",
   missCounts:{longLeft:"accuracyLongLeft",longRight:"accuracyLongRight",shortLeft:"accuracyShortLeft",shortRight:"accuracyShortRight"}
  },
  selectionIds:{made:"accuracy-made",longLeft:"accuracy-longLeft",longRight:"accuracy-longRight",shortLeft:"accuracy-shortLeft",shortRight:"accuracy-shortRight"}
 },
 contact:{
  title:"Contact",
  goodLabel:"Center",
  missLabel:"Off-Center",
  percentLabel:"Flush %",
  missKeys:["highToe","highHeel","lowToe","lowHeel"],
  missLabels:{highToe:"High Toe",highHeel:"High Heel",lowToe:"Low Toe",lowHeel:"Low Heel"},

 if(result.type!=="made"&&bucket.missed>0) bucket.missed--
 if(result.type==="missed"&&result.dir&&bucket.missDir[result.dir]>0) bucket.missDir[result.dir]--
 if(result.type==="duff"&&bucket.duffs>0) bucket.duffs--

     const row=document.createElement("div")
     row.className="history-block"
     const accuracyPct=accuracyCount?Math.round((accuracyBucket.made||0)/accuracyCount*100):0
     const contactPct=contactCount?Math.round((contactBucket.made||0)/contactCount*100):0
     const windSummary=mode==="range" ? getRangeWindSummary(session.shots,club,distance) : ""
     const tempSummary=mode==="range" ? getRangeTempSummary(session.shots,club,distance) : ""
     const targetFeet=getTargetFeet(distance,mode)
     const upAndDown=getUpAndDownValue(distance,mode)
     const earnedMark=mode==="wedge"&&accuracyPct>upAndDown ? " ⭐" : ""
     row.innerHTML="<strong>"+formatClubLabel(club)+" - "+distance+" yd ("+(mode==="range"?"Range":"Wedge")+"):</strong>"+
      (mode==="wedge" ? " "+targetFeet+"ft"+earnedMark : " Range Mode")+
      (mode==="wedge"
       ? '<br><span class="subtle">Up and Down: '+formatPercent(upAndDown)+'%</span>'
       : '<br><span class="subtle">Wind: '+(windSummary||"Not recorded")+' | Temp: '+(tempSummary||"Not recorded")+'</span>')+
      '<br><span class="subtle">Accuracy: '+(accuracyBucket.made||0)+'/'+accuracyCount+' ('+accuracyPct+'%)</span>'+
      '<br><span class="subtle">'+formatTrackerMissSummary("accuracy",accuracyBucket.missDir)+'</span>'+
      '<br><span class="subtle">Contact: '+(contactBucket.made||0)+'/'+contactCount+' ('+contactPct+'%)</span>'+
      '<br><span class="subtle">'+formatTrackerMissSummary("contact",contactBucket.missDir)+'</span>'+
      '<br><span class="subtle">Mishits - Duffs: '+(accuracyBucket.duffs||0)+' | Shanks: '+(accuracyBucket.shanks||0)+' | Skulls: '+(accuracyBucket.skulls||0)+'</span>'
     accordion.appendChild(row)
    })
   })
  })
  const deleteButton=document.createElement("button")
  deleteButton.textContent="🗑️ Delete Session"
  deleteButton.onclick=event=>{event.stopPropagation();deleteSession(index)}
  deleteButton.style="display:block;width:100%;margin-top:10px;background:#E34234;color:#000;padding:6px 10px;font-size:20px;font-weight:800;border:none;border-radius:12px;cursor:pointer;"
  accordion.appendChild(deleteButton)
  wrapper.append(card,accordion)
  historyNode.appendChild(wrapper)
 })
}
function initApp(){
 TRACKER_KEYS.forEach(trackerKey=>{
  statsMapByTracker[trackerKey]=loadTrackerStats(trackerKey)
  streaksByTracker[trackerKey]=loadTrackerStreaks(trackerKey)
  bestStreaksByTracker[trackerKey]=loadTrackerBestStreaks(trackerKey)
 })
 const shouldCompactStoredSessions=storedSessionsNeedCompaction()
 sessions=loadSessions()
 if(shouldCompactStoredSessions) saveSessions(sessions)
 shotHistory=loadShotHistory()
 rebuildLiveTrackingFromHistory()
 const selectionState=loadSelectionState()
 modeSelections={wedge:selectionState.wedge}
 rangeSelections=selectionState.range
 practiceMode=loadPracticeMode()
 targetSetMode=loadTargetSetMode()
 rangeWindSpeed=loadRangeWindSpeed()
 rangeTemperature=loadRangeTemperature()
 if(targetSetMode==="range"){
  if(practiceMode==="manual"){
   currentClub=RANGE_CLUBS.includes(rangeSelections.manual.club)?rangeSelections.manual.club:MODE_CONFIG.range.defaultClub
   currentDistance=getManualRangeTargetDistance(currentClub)
   rangeSelections.manual={club:currentClub,distance:currentDistance}
  }else{
   currentClub=RANGE_CLUBS.includes(rangeSelections.random.club)?rangeSelections.random.club:MODE_CONFIG.range.defaultClub
   currentDistance=getSelectableDistances("range").includes(rangeSelections.random.distance)?rangeSelections.random.distance:MODE_CONFIG.range.defaultDistance
   rangeSelections.random={club:currentClub,distance:currentDistance}
  }
 }else{
  currentClub=modeSelections.wedge.club
  currentDistance=modeSelections.wedge.distance
 }
 persistLiveState()
 if(practiceMode==="random") pickRandomTarget()
 else syncCurrentSelection()
 refreshHistoryPanel()
 renderPracticeMode()
 updateStats()
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initApp)
else initApp()
</script>
</body>
